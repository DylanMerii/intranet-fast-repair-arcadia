<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Repair Arcadia</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }
    header {
      background: #000;
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid red;
    }
    header h1 {
      margin: 0;
      font-size: 2.5em;
      color: red;
    }
    header p {
      margin: 5px 0 0;
      color: #ccc;
    }
    .hero {
      padding: 60px 20px;
      text-align: center;
      background: linear-gradient(45deg, #000, #222);
    }
    .hero h2 {
      font-size: 2em;
      margin-bottom: 10px;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: red;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
    }
    .services {
      padding: 40px 20px;
      text-align: center;
    }
    .services h3 {
      margin-bottom: 20px;
    }
    .card {
      background: #222;
      margin: 10px;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #000;
      border-top: 1px solid #333;
    }
  </style>
</head>
<body>

<header>
  <h1>FAST REPAIR</h1>
  <p>Arcadia</p>
</header>

<section class="hero">
  <h2>Dépannage & Réparation Automobile</h2>
  <p>Intervention rapide 24h/24</p>
  <a href="#contact" class="btn">Nous contacter</a>
</section>

<section class="services">
  <h3>Nos Services</h3>
  <div class="card">🚗 Dépannage</div>
  <div class="card">🔧 Réparation</div>
  <div class="card">🛞 Pneus</div>
  <div class="card">⚡ Batterie</div>
</section>

<section id="contact" class="services">
  <h3>Contact</h3>
  <p>Téléphone : 06 00 00 00 00</p>
  <p>Email : contact@fastrepair.fr</p>
</section>

<footer>
  <p>© 2026 Fast Repair Arcadia</p>
</footer>

</body>
</html>
